---
name: Build Targets

on:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip build]')"
    name: ${{ matrix.target }}
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        target:
          - GZDoom
          - Raze
          - PrBoom-Plus
          - quakespasm-exp

    steps:
      - uses: actions/checkout@v4

      - name: Build target
        run: |
          ./build.py --target ${{ matrix.target }}

      - name: Generate Xcode project
        run: |
          ./build.py --target ${{ matrix.target }} --xcode

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          path: output
          name: ${{ matrix.target }}

      - name: List Build Directory
        if: always()
        shell: bash
        run: |
          git status
          ls -lR .
...
